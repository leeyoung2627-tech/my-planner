<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>두목의 플래너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f4ff;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh;gap:10px}

/* 초기 로딩 — 깜빡임 방지 */
#loginWrap,#topMemoBar,#mainApp{display:none}

.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;width:100%}
.login-box{background:#fff;border-radius:16px;padding:40px;width:320px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 4px 24px #0001;border:0.5px solid #eee}
.login-title{font-size:20px;font-weight:700;color:#222}
.login-sub{font-size:13px;color:#aaa;text-align:center}
.google-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;border-radius:8px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#222;font-family:inherit;width:100%;justify-content:center}
.google-btn:hover{background:#f5f5f5}
.google-btn img{width:20px;height:20px}

/* 상단 메모바 */
.top-memo-bar{width:100%;max-width:1260px;background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:10px 16px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 2px 8px #0001}
.top-memo-label{font-size:11px;color:#aaa;white-space:nowrap;padding-top:3px;flex-shrink:0}
.top-memo-input{flex:1;border:none;outline:none;font-size:13px;color:#222;font-family:inherit;resize:none;line-height:1.6;background:transparent;min-height:24px;max-height:120px;overflow-y:auto}

/* 앱 레이아웃 */
.app{display:grid;grid-template-columns:1fr 340px 160px;min-height:640px;border:0.5px solid #ddd;border-radius:16px;overflow:hidden;background:#fff;width:100%;max-width:1260px;box-shadow:0 4px 24px #0001}

/* 왼쪽 */
.left{display:flex;flex-direction:column;border-right:0.5px solid #eee;min-width:0}
.top-nav{display:flex;align-items:center;gap:6px;padding:.65rem .85rem;border-bottom:0.5px solid #eee;flex-shrink:0}
.nav-btn{background:none;border:none;cursor:pointer;color:#666;padding:2px 6px;border-radius:4px;font-size:17px;line-height:1}
.nav-btn:hover{background:#f0f0f0}
.period-label{font-size:14px;font-weight:600;color:#222;flex:1}
.view-toggle{display:flex;gap:4px}
.vbtn{padding:3px 9px;border-radius:8px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:transparent;color:#888}
.vbtn.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.user-area{display:flex;align-items:center;gap:6px}
.user-name{font-size:11px;color:#888}
.logout-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid #eee;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:inherit}
.logout-btn:hover{background:#f5f5f5}

.left-view{flex:1;overflow-y:auto}

/* 일정 달력 */
.cal-wrap{padding:.65rem .85rem}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dow{text-align:center;font-size:11px;color:#aaa;padding:2px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

/* 날짜 칸 2배 높이 */
.day-cell{min-height:110px;display:flex;flex-direction:column;align-items:center;padding:5px 3px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;font-size:12px;gap:2px}
.day-cell:hover{background:#f5f4ff}
.day-cell.other{color:#ccc}
.day-cell.today .dn{background:#534AB7;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-cell.selected{border-color:#AFA9EC;background:#EEEDFE}
.dot-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.dot{width:4px;height:4px;border-radius:50%;background:#534AB7}

/* 가계부 달력 — 금액 표시 */
.money-cal-wrap{padding:.65rem .85rem}
.money-day-cell{min-height:110px;display:flex;flex-direction:column;align-items:flex-start;padding:5px 4px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;font-size:12px;gap:2px}
.money-day-cell:hover{background:#fff8f5}
.money-day-cell.other{color:#ccc}
.money-day-cell.today .mdn{background:#534AB7;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px}
.money-day-cell.selected{border-color:#D85A30;background:#FFF0EB}
.mdn{font-size:12px;color:#333;font-weight:500;width:22px;text-align:center}
.money-day-out{font-size:10px;color:#D85A30;line-height:1.3}
.money-day-in{font-size:10px;color:#1D9E75;line-height:1.3}
.money-day-ns{font-size:10px;margin-top:auto}

/* 주간 */
.week-wrap{padding:.65rem .85rem}
.week-head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.wh-cell{text-align:center}
.wh-dow{font-size:11px;color:#aaa}
.wh-num{font-size:13px;font-weight:500;color:#222;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.wh-num.today{background:#534AB7;color:#fff}
.wh-num.selected{background:#EEEDFE;color:#3C3489}
.week-body{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;align-items:start}
.day-col{min-height:200px;border:0.5px solid #eee;border-radius:8px;padding:5px;display:flex;flex-direction:column;gap:3px;cursor:pointer}
.day-col:hover{background:#f9f8ff}
.day-col.selected{border-color:#AFA9EC;background:#EEEDFE44}
.week-event-item{background:#EEEDFE;border-radius:4px;padding:3px 5px;font-size:11px;color:#3C3489;line-height:1.3;word-break:break-all;cursor:pointer}
.week-event-item:hover{background:#dddaf5}
.week-event-item.dragging{opacity:.4}
.week-add-btn{font-size:10px;color:#bbb;cursor:pointer;padding:2px;text-align:center;border-radius:4px;margin-top:auto}
.week-add-btn:hover{background:#eee;color:#888}
.day-col.drag-over{background:#EEEDFE88;border-color:#AFA9EC}

/* 습관 뷰 */
.habit-view{padding:.85rem}
.habit-view-header{font-size:13px;font-weight:600;color:#222;margin-bottom:10px}
.habit-card{background:#fff;border:0.5px solid #eee;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.habit-top{display:flex;align-items:center;justify-content:space-between}
.habit-name{font-size:13px;color:#222}
.habit-badge{font-size:11px;padding:2px 7px;border-radius:999px}
.habit-badge.done{background:#E1F5EE;color:#0F6E56}
.habit-badge.fail{background:#f5f5f5;color:#aaa}
.habit-badge.prog{background:#EEEDFE;color:#3C3489}
.habit-dots{display:flex;gap:5px;flex-wrap:wrap}
.hdot{width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ccc;transition:all .15s}
.hdot.filled{background:#1D9E75;border-color:#1D9E75;color:#fff}
.hdot.target{border-color:#AFA9EC;border-style:dashed}
.habit-goal{font-size:11px;color:#aaa}
.habit-actions{display:flex;gap:6px}
.habit-mini-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid #eee;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:inherit}
.habit-mini-btn:hover{background:#f5f5f5}

/* 메모 뷰 */
.memo-view{padding:.85rem;display:flex;flex-direction:column;gap:10px;height:100%}
.memo-detail-box{background:#fafafa;border:0.5px solid #eee;border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.memo-detail-cat{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px}
.memo-detail-cat.정체성{background:#FFF3E0;color:#E65100}
.memo-detail-cat.할일{background:#E8F5E9;color:#2E7D32}
.memo-detail-cat.아이디어{background:#E3F2FD;color:#1565C0}
.memo-detail-cat.기타{background:#F5F5F5;color:#666}
.memo-detail-title-text{font-size:16px;font-weight:600;color:#222;border:none;outline:none;background:transparent;width:100%;font-family:inherit}
.memo-detail-body-text{font-size:13px;color:#444;border:none;outline:none;background:transparent;width:100%;resize:none;flex:1;min-height:300px;line-height:1.8;font-family:inherit}
.memo-detail-actions{display:flex;gap:8px;justify-content:flex-end}
.mdabtn{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-family:inherit}
.mdabtn.save{background:#534AB7;color:#fff}
.mdabtn.del{background:#FAECE7;color:#993C1D}

/* 오른쪽 패널 */
.right{display:flex;flex-direction:column;background:#fafafa;border-right:0.5px solid #eee;min-width:0}
.right-date{padding:.6rem 1rem;font-size:13px;font-weight:600;color:#222;border-bottom:0.5px solid #eee;flex-shrink:0}
.tabs{display:flex;border-bottom:0.5px solid #eee;flex-shrink:0;overflow-x:auto}
.tab{flex:1;min-width:38px;padding:7px 2px;text-align:center;font-size:11px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#534AB7;border-bottom-color:#534AB7;background:#fff}
.tab-content{flex:1;padding:.75rem 1rem;overflow-y:auto;display:none;flex-direction:column;gap:6px}
.tab-content.active{display:flex}
.section-title{font-size:11px;color:#aaa}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.item-row:last-of-type{border-bottom:none}
.check{width:16px;height:16px;border-radius:4px;border:0.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.check.done{background:#534AB7;border-color:#534AB7;color:#fff}
.item-text{font-size:13px;color:#222;flex:1}
.item-text.done{text-decoration:line-through;color:#bbb}
.add-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#aaa;cursor:pointer;padding:3px 0;background:none;border:none;font-family:inherit;margin-top:2px}
.add-btn:hover{color:#666}

/* 무지출 */
.no-spend-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border:0.5px solid #eee;border-radius:8px;cursor:pointer;flex-shrink:0}
.no-spend-bar:hover{background:#f9f8ff}
.ns-check{width:18px;height:18px;border-radius:4px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ns-check.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ns-label{font-size:13px;color:#222}
.ns-badge{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:999px;background:#E1F5EE;color:#0F6E56;display:none}
.ns-badge.show{display:block}

/* 예산 바 */
.budget-box{background:#fff;border:0.5px solid #eee;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.budget-top{display:flex;align-items:center;justify-content:space-between}
.budget-label{font-size:12px;color:#666}
.budget-edit-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid #eee;padding:1px 7px;border-radius:4px;cursor:pointer;font-family:inherit}
.budget-edit-btn:hover{background:#f5f5f5}
.budget-track{height:12px;border-radius:999px;background:#f0f0f0;overflow:hidden;position:relative}
.budget-fill{height:100%;border-radius:999px;transition:width .4s;background:linear-gradient(90deg,#1D9E75,#D85A30)}
.budget-nums{display:flex;justify-content:space-between;font-size:11px}
.budget-spent{color:#D85A30;font-weight:500}
.budget-remain{color:#aaa}

/* 가계부 */
.money-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.money-row:last-of-type{border-bottom:none}
.money-cat{font-size:12px;color:#666}
.money-amt{font-size:13px;font-weight:500}
.money-amt.out{color:#D85A30}
.money-amt.in{color:#1D9E75}

/* 식단 */
.meal-slot{padding:6px 8px;border-radius:8px;border:0.5px solid #eee;background:#fff}
.meal-label{font-size:11px;color:#aaa;margin-bottom:2px}
.meal-text{font-size:13px;color:#222;outline:none;min-height:20px;line-height:1.6}
.meal-text:empty:before{content:attr(data-ph);color:#ccc;pointer-events:none}

/* 메모 탭 */
.memo-filter{display:flex;gap:5px;flex-wrap:wrap}
.filter-chip{padding:3px 9px;border-radius:999px;font-size:11px;border:0.5px solid #ddd;cursor:pointer;background:#fff;color:#888;font-family:inherit}
.filter-chip.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.memo-card{background:#fff;border:0.5px solid #eee;border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
.memo-card:hover{border-color:#AFA9EC}
.memo-card-top{display:flex;align-items:center;gap:6px}
.memo-card-title{font-size:13px;font-weight:600;color:#222;flex:1}
.memo-cat-badge{font-size:10px;padding:2px 7px;border-radius:999px;white-space:nowrap}
.memo-cat-badge.정체성{background:#FFF3E0;color:#E65100}
.memo-cat-badge.할일{background:#E8F5E9;color:#2E7D32}
.memo-cat-badge.아이디어{background:#E3F2FD;color:#1565C0}
.memo-cat-badge.기타{background:#F5F5F5;color:#666}
.memo-card-body{font-size:12px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.memo-card-date{font-size:10px;color:#ccc}
.memo-delete{font-size:11px;color:#ddd;cursor:pointer;padding:2px 4px;border-radius:4px;background:none;border:none;font-family:inherit;flex-shrink:0}
.memo-delete:hover{color:#D85A30}

/* 요약바 */
.summary-bar{padding:.6rem 1rem;border-top:0.5px solid #eee;display:flex;gap:6px;flex-shrink:0}
.sum-chip{flex:1;text-align:center;padding:4px 2px;border-radius:8px;font-size:11px}
.sum-chip.s{background:#EEEDFE;color:#3C3489}
.sum-chip.h{background:#E1F5EE;color:#0F6E56}
.sum-chip.m{background:#FAECE7;color:#993C1D}

/* 디데이 */
.dday-sidebar{display:flex;flex-direction:column;background:#fafafa;padding:.75rem .65rem;gap:8px;overflow-y:auto}
.dday-header{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.04em;padding-bottom:4px;border-bottom:0.5px solid #eee}
.dday-card{background:#fff;border:0.5px solid #eee;border-radius:10px;padding:9px 10px;display:flex;flex-direction:column;gap:3px;position:relative}
.dday-title{font-size:12px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px}
.dday-date{font-size:10px;color:#aaa}
.dday-num{font-size:18px;font-weight:700;line-height:1.1}
.dday-num.future{color:#534AB7}
.dday-num.today{color:#1D9E75}
.dday-num.past{color:#D85A30}
.dday-sub{font-size:10px;color:#aaa}
.dday-del{position:absolute;top:6px;right:6px;font-size:10px;color:#ddd;background:none;border:none;cursor:pointer;padding:1px 3px;border-radius:3px;font-family:inherit}
.dday-del:hover{color:#D85A30}
.dday-add-btn{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px;color:#aaa;cursor:pointer;padding:6px;background:#fff;border:0.5px dashed #ddd;border-radius:10px;font-family:inherit}
.dday-add-btn:hover{color:#534AB7;border-color:#AFA9EC}

.saving-indicator{position:fixed;bottom:20px;right:20px;background:#534AB7;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;display:none;z-index:999}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:#00000040;display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:20px;width:300px;display:flex;flex-direction:column;gap:10px;border:0.5px solid #eee;box-shadow:0 8px 32px #0002}
.modal.wide{width:360px}
.modal h3{font-size:14px;font-weight:600;color:#222}
.modal input,.modal select,.modal textarea{width:100%;padding:6px 10px;border-radius:6px;border:0.5px solid #ddd;background:#fafafa;color:#222;font-size:13px;outline:none;font-family:inherit}
.modal textarea{resize:vertical;min-height:100px;line-height:1.6}
.modal-label{font-size:12px;color:#666}
.modal-row{display:flex;gap:8px}
.modal-row input,.modal-row select{flex:1}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mbtn{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-family:inherit}
.mbtn.cancel{background:#f0f0f0;color:#666}
.mbtn.ok{background:#534AB7;color:#fff}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:40px">📅</div>
    <div class="login-title">두목의 플래너</div>
    <div class="login-sub">구글 계정으로 로그인하면<br>어디서든 기록이 동기화돼요</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      Google로 로그인
    </button>
  </div>
</div>

<div class="top-memo-bar" id="topMemoBar">
  <span class="top-memo-label">📌 메모</span>
  <textarea class="top-memo-input" id="topMemoInput" placeholder="빠른 메모..." rows="1"
    oninput="autoResizeTopMemo(this)" onblur="saveTopMemo()"></textarea>
</div>

<div class="app" id="mainApp">
  <div class="left">
    <div class="top-nav">
      <button class="nav-btn" id="leftBackBtn" onclick="handleLeftBack()" style="display:none">←</button>
      <button class="nav-btn" id="navPrev" onclick="movePeriod(-1)">‹</button>
      <span class="period-label" id="periodLabel"></span>
      <button class="nav-btn" id="navNext" onclick="movePeriod(1)">›</button>
      <div class="view-toggle" id="viewToggle">
        <button class="vbtn active" id="btnMonth" onclick="switchView('month')">월</button>
        <button class="vbtn" id="btnWeek" onclick="switchView('week')">주</button>
      </div>
      <div class="user-area">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logoutUser()">로그아웃</button>
      </div>
    </div>
    <div class="left-view" id="leftView">
      <div id="monthView" class="cal-wrap"></div>
      <div id="weekView" class="week-wrap" style="display:none"></div>
      <div id="moneyCalView" class="money-cal-wrap" style="display:none"></div>
      <div id="habitView" class="habit-view" style="display:none">
        <div class="habit-view-header">습관 트래커</div>
        <div id="habitViewList"></div>
        <button class="add-btn" onclick="openHabitModal()" style="margin-top:4px">＋ 습관 추가</button>
      </div>
      <div id="memoView" class="memo-view" style="display:none"></div>
    </div>
  </div>

  <div class="right">
    <div class="right-date" id="rightDate"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('schedule',this)">📅 일정</div>
      <div class="tab" onclick="switchTab('money',this)">💰 가계부</div>
      <div class="tab" onclick="switchTab('meal',this)">🥗 식단</div>
      <div class="tab" onclick="switchTab('memo',this)">📝 메모</div>
      <div class="tab" onclick="switchTab('habit-tab',this)">✅ 습관</div>
    </div>

    <div id="tab-schedule" class="tab-content active">
      <div id="schedule-list"></div>
      <button class="add-btn" onclick="openScheduleModal()">＋ 일정 추가</button>
    </div>

    <div id="tab-money" class="tab-content">
      <!-- 예산 박스 -->
      <div class="budget-box" id="budgetBox">
        <div class="budget-top">
          <span class="budget-label">이번 달 예산</span>
          <button class="budget-edit-btn" onclick="openBudgetModal()">설정</button>
        </div>
        <div class="budget-track"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
        <div class="budget-nums">
          <span class="budget-spent" id="budgetSpent">지출 0원</span>
          <span class="budget-remain" id="budgetRemain">예산 미설정</span>
        </div>
      </div>
      <div class="no-spend-bar" onclick="toggleNoSpend()">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkSmyAwRUlpgZBUz0kXqCVoS29dYht7No",
  authDomain: "my-planner-3728c.firebaseapp.com",
  projectId: "my-planner-3728c",
  storageBucket: "my-planner-3728c.firebasestorage.app",
  messagingSenderId: "179812397978",
  appId: "1:179812397978:web:3525714542291e818e0023"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser=null;
const today=new Date();
let cur=new Date(today.getFullYear(),today.getMonth(),1);
let selDate=new Date(today);
let curView='month';
let leftMode='cal'; // 'cal'|'money-cal'|'habit'|'memo'
const DAYS=['일','월','화','수','목','금','토'];
let habits=[],editingHabitId=null;
let weekEvents={},moneyData={},mealData={};
let memos=[],editingMemoId=null,currentMemoFilter='전체',viewingMemoId=null;
let noSpendData={};
let ddayList=[];
let budgetData={}; // {YYYY-M: amount}
let topMemoContent='';
let mealSaveTimers={};
let dragSrcKey=null,dragSrcIdx=null;

function fmt(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function showSaving(){const el=document.getElementById('savingIndicator');el.style.display='block';setTimeout(()=>el.style.display='none',1200);}

// ── Auth — 깜빡임 방지 ──
// 모든 요소 기본 display:none, onAuthStateChanged에서만 보여줌
window.loginWithGoogle=async()=>{try{await signInWithPopup(auth,provider);}catch(e){alert('로그인 실패: '+e.message);}};
window.logoutUser=async()=>await signOut(auth);

onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('topMemoBar').style.display='flex';
    document.getElementById('mainApp').style.display='grid';
    document.getElementById('userName').textContent=user.displayName?.split(' ')[0]||'';
    await loadAllData();
    renderMonth();updateRightDate();renderHabits();renderSchedule();renderMoney();renderMeal();renderMemos();renderDdays();loadTopMemo();
  } else {
    currentUser=null;
    document.getElementById('loginWrap').style.display='flex';
    document.getElementById('topMemoBar').style.display='none';
    document.getElementById('mainApp').style.display='none';
  }
});

// ── Firestore ──
async function saveData(type,key,value){if(!currentUser)return;showSaving();await setDoc(doc(db,'users',currentUser.uid,type,key),value);}
async function deleteData(type,key){if(!currentUser)return;await deleteDoc(doc(db,'users',currentUser.uid,type,key));}
async function loadAllData(){
  if(!currentUser)return;
  const [evS,hbS,mnS,mlS,moS,nsS,ddS,bdS,tmS]=await Promise.all([
    getDocs(collection(db,'users',currentUser.uid,'events')),
    getDocs(collection(db,'users',currentUser.uid,'habits')),
    getDocs(collection(db,'users',currentUser.uid,'money')),
    getDocs(collection(db,'users',currentUser.uid,'meal')),
    getDocs(collection(db,'users',currentUser.uid,'memos')),
    getDocs(collection(db,'users',currentUser.uid,'nospend')),
    getDocs(collection(db,'users',currentUser.uid,'ddays')),
    getDocs(collection(db,'users',currentUser.uid,'budget')),
    getDoc(doc(db,'users',currentUser.uid,'settings','topMemo')),
  ]);
  weekEvents={};evS.forEach(d=>{weekEvents[d.id]=d.data().items||[];});
  habits=[];hbS.forEach(d=>{habits.push({id:d.id,...d.data()});});
  moneyData={};mnS.forEach(d=>{moneyData[d.id]=d.data().items||[];});
  mealData={};mlS.forEach(d=>{mealData[d.id]=d.data();});
  memos=[];moS.forEach(d=>{memos.push({id:d.id,...d.data()});});
  memos.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  noSpendData={};nsS.forEach(d=>{noSpendData[d.id]=d.data().done||false;});
  ddayList=[];ddS.forEach(d=>{ddayList.push({id:d.id,...d.data()});});
  ddayList.sort((a,b)=>new Date(a.date)-new Date(b.date));
  budgetData={};bdS.forEach(d=>{budgetData[d.id]=d.data().amount||0;});
  topMemoContent=tmS.exists()?tmS.data().text||'':'';
}

// ── 상단 메모 ──
function loadTopMemo(){document.getElementById('topMemoInput').value=topMemoContent;autoResizeTopMemo(document.getElementById('topMemoInput'));}
window.autoResizeTopMemo=function(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';};
window.saveTopMemo=async function(){
  const text=document.getElementById('topMemoInput').value;
  if(text===topMemoContent)return;topMemoContent=text;
  await setDoc(doc(db,'users',currentUser.uid,'settings','topMemo'),{text});showSaving();
};

// ── 왼쪽 모드 전환 ──
function setLeftMode(mode){
  leftMode=mode;
  const views=['monthView','weekView','moneyCalView','habitView','memoView'];
  views.forEach(v=>document.getElementById(v).style.display='none');
  const isCalMode=mode==='cal'||mode==='money-cal';
  document.getElementById('navPrev').style.display=isCalMode?'':'none';
  document.getElementById('navNext').style.display=isCalMode?'':'none';
  document.getElementById('viewToggle').style.display=mode==='cal'?'':'none';
  document.getElementById('leftBackBtn').style.display=isCalMode?'none':'';
  if(mode==='cal'){
    if(curView==='week'){document.getElementById('weekView').style.display='';renderWeek();}
    else{document.getElementById('monthView').style.display='';renderMonth();}
    document.getElementById('periodLabel').textContent=curView==='month'?cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월':'';
  } else if(mode==='money-cal'){
    document.getElementById('moneyCalView').style.display='';
    renderMoneyCal();
    document.getElementById('periodLabel').textContent=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월 가계부';
  } else if(mode==='habit'){
    document.getElementById('habitView').style.display='';
    document.getElementById('periodLabel').textContent='습관 트래커';
    renderHabitsLeft();
  } else if(mode==='memo'){
    document.getElementById('memoView').style.display='flex';
    document.getElementById('periodLabel').textContent='메모 보기';
  }
}
window.handleLeftBack=function(){
  viewingMemoId=null;
  if(leftMode==='money-cal')setLeftMode('money-cal');
  else setLeftMode('cal');
};

// ── 탭 전환 ──
window.switchTab=function(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='money'){
    setLeftMode('money-cal');
  } else if(name==='habit-tab'){
    setLeftMode('habit');
  } else if(name==='memo'){
    if(leftMode==='memo'){}
    else setLeftMode('cal');
  } else {
    // 일정, 식단 — 달력으로 복귀
    if(leftMode!=='cal')setLeftMode('cal');
  }
};

// ── 캘린더 ──
window.movePeriod=function(dir){
  if(curView==='month'||leftMode==='money-cal'){
    cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1);
    if(leftMode==='money-cal')renderMoneyCal();
    else renderMonth();
  } else {
    selDate=new Date(selDate);selDate.setDate(selDate.getDate()+dir*7);renderWeek();updateRightDate();
  }
};
function renderMonth(){
  document.getElementById('periodLabel').textContent=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월';
  const start=new Date(cur.getFullYear(),cur.getMonth(),1).getDay();
  const total=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const prevTotal=new Date(cur.getFullYear(),cur.getMonth(),0).getDate();
  let html='<div class="dow-row">'+DAYS.map(d=>`<div class="dow">${d}</div>`).join('')+'</div><div class="month-grid">';
  for(let i=0;i<start;i++)html+=`<div class="day-cell other"><span class="dn">${prevTotal-start+1+i}</span></div>`;
  for(let d=1;d<=total;d++){
    const dt=new Date(cur.getFullYear(),cur.getMonth(),d);
    const key=fmt(dt);
    const isToday=fmt(dt)===fmt(today),isSel=fmt(dt)===fmt(selDate);
    const hasEv=weekEvents[key]&&weekEvents[key].length>0;
    html+=`<div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay(${d})"><span class="dn">${d}</span><div class="dot-row">${hasEv?'<div class="dot"></div>':''}</div></div>`;
  }
  const rem=(7-(start+total)%7)%7;
  for(let i=1;i<=rem&&rem<7;i++)html+=`<div class="day-cell other"><span class="dn">${i}</span></div>`;
  html+='</div>';
  document.getElementById('monthView').innerHTML=html;
}

// ── 가계부 전용 달력 ──
function renderMoneyCal(){
  document.getElementById('periodLabel').textContent=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월 가계부';
  const start=new Date(cur.getFullYear(),cur.getMonth(),1).getDay();
  const total=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const prevTotal=new Date(cur.getFullYear(),cur.getMonth(),0).getDate();
  let html='<div class="dow-row">'+DAYS.map(d=>`<div class="dow">${d}</div>`).join('')+'</div><div class="month-grid">';
  for(let i=0;i<start;i++)html+=`<div class="money-day-cell other"><span class="mdn">${prevTotal-start+1+i}</span></div>`;
  for(let d=1;d<=total;d++){
    const dt=new Date(cur.getFullYear(),cur.getMonth(),d);
    const key=fmt(dt);
    const isToday=fmt(dt)===fmt(today),isSel=fmt(dt)===fmt(selDate);
    const items=moneyData[key]||[];
    let dayOut=0,dayIn=0;
    items.forEach(item=>{if(item.type==='out')dayOut+=item.amount;else dayIn+=item.amount;});
    const ns=noSpendData[key];
    const outHtml=dayOut>0?`<div class="money-day-out">-${dayOut.toLocaleString()}</div>`:'';
    const inHtml=dayIn>0?`<div class="money-day-in">+${dayIn.toLocaleString()}</div>`:'';
    const nsHtml=ns?`<div class="money-day-ns">💚</div>`:'';
    html+=`<div class="money-day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay(${d})"><span class="mdn">${d}</span>${outHtml}${inHtml}${nsHtml}</div>`;
  }
  const rem=(7-(start+total)%7)%7;
  for(let i=1;i<=rem&&rem<7;i++)html+=`<div class="money-day-cell other"><span class="mdn">${i}</span></div>`;
  html+='</div>';
  document.getElementById('moneyCalView').innerHTML=html;
}

function getWeekStart(d){const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s;}
function renderWeek(){
  const ws=getWeekStart(selDate);const we=new Date(ws);we.setDate(ws.getDate()+6);
  const m1=ws.getMonth()+1,m2=we.getMonth()+1;
  let label=ws.getFullYear()+'년 '+m1+'월 '+ws.getDate()+'일';
  if(m1!==m2)label+=' ~ '+m2+'월 '+we.getDate()+'일';else label+=' ~ '+we.getDate()+'일';
  document.getElementById('periodLabel').textContent=label;
  let hH='<div class="week-head-row">',bH='<div class="week-body">';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const isT=fmt(d)===fmt(today),isS=fmt(d)===fmt(selDate);
    hH+=`<div class="wh-cell"><div class="wh-dow">${DAYS[i]}</div><div class="wh-num${isT?' today':isS?' selected':''}">${d.getDate()}</div></div>`;
    const key=fmt(d);const evs=weekEvents[key]||[];
    const dStr=`${d.getFullYear()},${d.getMonth()},${d.getDate()}`;
    bH+=`<div class="day-col${isS?' selected':''}" data-key="${key}"
      onclick="selectDayFromWeek(${dStr})"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropEvent(event,'${key}')">`;
    evs.forEach((ev,idx)=>{
      bH+=`<div class="week-event-item" draggable="true"
        ondragstart="dragStart(event,'${key}',${idx})"
        ondragend="dragEnd(event)"
        onclick="event.stopPropagation();editWeekEvent('${key}',${idx})">${ev}</div>`;
    });
    bH+=`<div class="week-add-btn" onclick="event.stopPropagation();addWeekEvent('${key}')">＋</div></div>`;
  }
  document.getElementById('weekView').innerHTML=hH+'</div>'+bH+'</div>';
}

// ── 드래그 앤 드롭 ──
window.dragStart=function(e,key,idx){dragSrcKey=key;dragSrcIdx=idx;e.target.classList.add('dragging');};
window.dragEnd=function(e){e.target.classList.remove('dragging');document.querySelectorAll('.day-col').forEach(c=>c.classList.remove('drag-over'));};
window.dropEvent=async function(e,targetKey){
  e.preventDefault();
  document.querySelectorAll('.day-col').forEach(c=>c.classList.remove('drag-over'));
  if(!dragSrcKey||dragSrcIdx===null||dragSrcKey===targetKey)return;
  const ev=weekEvents[dragSrcKey]?.[dragSrcIdx];if(!ev)return;
  weekEvents[dragSrcKey].splice(dragSrcIdx,1);
  if(!weekEvents[targetKey])weekEvents[targetKey]=[];
  weekEvents[targetKey].push(ev);
  await saveData('events',dragSrcKey,{items:weekEvents[dragSrcKey]});
  await saveData('events',targetKey,{items:weekEvents[targetKey]});
  dragSrcKey=null;dragSrcIdx=null;
  renderWeek();renderMonth();
};

window.selectDay=function(d){
  selDate=new Date(cur.getFullYear(),cur.getMonth(),d);
  if(leftMode==='money-cal')renderMoneyCal();else renderMonth();
  updateRightDate();renderSchedule();renderMoney();renderMeal();renderNoSpend();
};
window.selectDayFromWeek=function(y,m,d){selDate=new Date(y,m,d);renderWeek();updateRightDate();renderSchedule();renderMoney();renderMeal();renderNoSpend();};
function updateRightDate(){document.getElementById('rightDate').textContent=selDate.getFullYear()+'년 '+(selDate.getMonth()+1)+'월 '+selDate.getDate()+'일 '+DAYS[selDate.getDay()]+'요일';}
window.addWeekEvent=async function(key){
  const name=prompt('일정 입력:');if(!name||!name.trim())return;
  if(!weekEvents[key])weekEvents[key]=[];weekEvents[key].push(name.trim());
  await saveData('events',key,{items:weekEvents[key]});renderWeek();renderMonth();renderSchedule();
};
window.editWeekEvent=async function(key,idx){
  const c=weekEvents[key][idx];const name=prompt('수정 (비우면 삭제):',c);if(name===null)return;
  if(name.trim()==='')weekEvents[key].splice(idx,1);else weekEvents[key][idx]=name.trim();
  await saveData('events',key,{items:weekEvents[key]});renderWeek();renderMonth();renderSchedule();
};
window.switchView=function(v){
  curView=v;
  document.getElementById('monthView').style.display=v==='month'?'':'none';
  document.getElementById('weekView').style.display=v==='week'?'':'none';
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  if(v==='week')renderWeek();else renderMonth();
};

// ── 일정 ──
function renderSchedule(){

  const list=document.getElementById('schedule-list');list.innerHTML='';
  evs.forEach((ev,idx)=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<div class="check" onclick="toggleScheduleCheck(this)"></div><span class="item-text">${ev}</span><span style="font-size:11px;color:#ccc;cursor:pointer" onclick="deleteScheduleItem('${key}',${idx})">✕</span>`;
    list.appendChild(row);
  });
  document.getElementById('sum-s').textContent='일정 '+evs.length+'개';
}
window.toggleScheduleCheck=function(el){el.classList.toggle('done');el.textContent=el.classList.contains('done')?'✓':'';el.nextElementSibling.classList.toggle('done');};
window.deleteScheduleItem=async function(key,idx){
  if(!confirm('삭제할까요?'))return;
  weekEvents[key].splice(idx,1);await saveData('events',key,{items:weekEvents[key]});
  renderSchedule();renderMonth();if(curView==='week')renderWeek();
};
window.openScheduleModal=function(){
  document.getElementById('sch-name').value='';document.getElementById('sch-time').value='';
  document.getElementById('scheduleModal').style.display='flex';
  setTimeout(()=>document.getElementById('sch-name').focus(),50);
};
window.confirmSchedule=async function(){
  const name=document.getElementById('sch-name').value.trim();if(!name)return;
  const time=document.getElementById('sch-time').value;const key=fmt(selDate);
  if(!weekEvents[key])weekEvents[key]=[];
  weekEvents[key].push(time?`[${time}] ${name}`:name);
  await saveData('events',key,{items:weekEvents[key]});
  closeModal('scheduleModal');renderSchedule();renderMonth();if(curView==='week')renderWeek();
};

// ── 무지출 ──
function renderNoSpend(){
  const key=fmt(selDate);const done=noSpendData[key]||false;

  check.className='ns-check'+(done?' done':'');check.textContent=done?'✓':'';

// ── 예산 ──
function getBudgetKey(){return cur.getFullYear()+'-'+( cur.getMonth()+1);}
function renderBudget(){
  const bKey=selDate.getFullYear()+'-'+(selDate.getMonth()+1);
  const budget=budgetData[bKey]||0;
  let monthOut=0;
  Object.keys(moneyData).forEach(k=>{
    if(k.startsWith(bKey+'-')||k===bKey){moneyData[k].forEach(i=>{if(i.type==='out')monthOut+=i.amount;});}
  });
  const pct=budget>0?Math.min(Math.round(monthOut/budget*100),100):0;
  document.getElementById('budgetFill').style.width=pct+'%';
  document.getElementById('budgetSpent').textContent='지출 '+monthOut.toLocaleString()+'원';
  document.getElementById('budgetRemain').textContent=budget>0?'잔여 '+(budget-monthOut).toLocaleString()+'원':'예산 미설정';
}
window.openBudgetModal=function(){
  const bKey=selDate.getFullYear()+'-'+(selDate.getMonth()+1);
  document.getElementById('budget-amount').value=budgetData[bKey]||'';
  document.getElementById('budgetModal').style.display='flex';
};
window.confirmBudget=async function(){
  const amount=parseInt(document.getElementById('budget-amount').value);if(!amount)return;
  const bKey=selDate.getFullYear()+'-'+(selDate.getMonth()+1);
  budgetData[bKey]=amount;
  await saveData('budget',bKey,{amount});
  closeModal('budgetModal');renderBudget();
};

// ── 습관 ──
function buildHabitCards(containerId){
  const list=document.getElementById(containerId);list.innerHTML='';
  let tt=0,td2=0;
  habits.forEach(h=>{
    tt+=h.target;td2+=Math.min(h.done||0,h.target);
    const pct=Math.round(Math.min((h.done||0)/h.target,1)*100);
    const isDone=(h.done||0)>=h.target;
    const bC=isDone?'done':(h.done||0)>0?'prog':'fail';
    const bT=isDone?'✓ 달성':(h.done||0)+'/'+h.target;
    const pl=h.period==='week'?'주':'월';
    let dots='<div class="habit-dots">';
    for(let i=0;i<Math.max(h.target,h.done||0);i++){
      const f=i<(h.done||0),t=i<h.target;
      dots+=`<div class="hdot${f?' filled':''}${!f&&t?' target':''}" onclick="toggleHabitDot('${h.id}',${i})">${f?'✓':''}</div>`;
    }
    dots+='</div>';
    const card=document.createElement('div');card.className='habit-card';
    card.innerHTML=`<div class="habit-top"><span class="habit-name">${h.emoji||'⭐'} ${h.name}</span><span class="habit-badge ${bC}">${bT}</span></div>${dots}<div style="display:flex;justify-content:space-between;align-items:center"><span class="habit-goal">${pl} ${h.target}회 목표 · ${pct}%</span><div class="habit-actions"><button class="habit-mini-btn" onclick="openHabitEdit('${h.id}')">목표 수정</button><button class="habit-mini-btn" onclick="deleteHabit('${h.id}')">삭제</button></div></div>`;
    list.appendChild(card);
  });
  return{tt,td2};
}
function renderHabits(){
  const{tt,td2}=buildHabitCards('habit-list-right');
  const pct=tt>0?Math.round(td2/tt*100):0;
  document.getElementById('sum-h').textContent='습관 '+pct+'%';
}
function renderHabitsLeft(){buildHabitCards('habitViewList');}
window.toggleHabitDot=async function(id,idx){
  const h=habits.find(x=>x.id===id);if(!h)return;
  if(idx<(h.done||0))h.done=idx;else h.done=idx+1;
  await saveData('habits',id,{name:h.name,emoji:h.emoji,period:h.period,target:h.target,done:h.done});
  renderHabits();if(leftMode==='habit')renderHabitsLeft();
};
window.openHabitModal=function(){
  document.getElementById('habitModal').style.display='flex';
  document.getElementById('hb-name').value='';document.getElementById('hb-emoji').value='';document.getElementById('hb-target').value=3;
  updateHabitPreview();
};
function updateHabitPreview(){document.getElementById('hb-preview').textContent=(document.getElementById('hb-period').value==='week'?'주':'월')+' '+document.getElementById('hb-target').value+'회 목표';}
document.addEventListener('input',e=>{if(e.target.id==='hb-target'||e.target.id==='hb-period')updateHabitPreview();});
window.confirmHabit=async function(){
  const name=document.getElementById('hb-name').value.trim();if(!name)return alert('이름을 입력해주세요');
  const emoji=document.getElementById('hb-emoji').value.trim()||'⭐';
  const period=document.getElementById('hb-period').value;
  const target=parseInt(document.getElementById('hb-target').value)||3;
  const id='h_'+Date.now();
  habits.push({id,name,emoji,period,target,done:0});
  await saveData('habits',id,{name,emoji,period,target,done:0});
  renderHabits();if(leftMode==='habit')renderHabitsLeft();closeModal('habitModal');
};
window.openHabitEdit=function(id){
  editingHabitId=id;const h=habits.find(x=>x.id===id);if(!h)return;
  document.getElementById('he-period').value=h.period;document.getElementById('he-target').value=h.target;
  document.getElementById('habitEditModal').style.display='flex';
};
window.confirmHabitEdit=async function(){
  const h=habits.find(x=>x.id===editingHabitId);if(!h)return;
  h.period=document.getElementById('he-period').value;h.target=parseInt(document.getElementById('he-target').value)||1;
  await saveData('habits',h.id,{name:h.name,emoji:h.emoji,period:h.period,target:h.target,done:h.done||0});
  renderHabits();if(leftMode==='habit')renderHabitsLeft();closeModal('habitEditModal');
};
window.deleteHabit=async function(id){
  if(!confirm('삭제할까요?'))return;
  habits=habits.filter(x=>x.id!==id);await deleteData('habits',id);
  renderHabits();if(leftMode==='habit')renderHabitsLeft();
};

// ── 가계부 ──
function renderMoney(){
  const key=fmt(selDate);const items=moneyData[key]||[];
  const list=document.getElementById('money-list');list.innerHTML='';
  let total=0;
  items.forEach((item,idx)=>{
    const row=document.createElement('div');row.className='money-row';
    const amt=item.type==='out'?-item.amount:item.amount;total+=amt;
    row.innerHTML=`<span class="money-cat">${item.name}</span><div style="display:flex;align-items:center;gap:8px"><span class="money-amt ${item.type}">${item.type==='out'?'-':'+'}${item.amount.toLocaleString()}</span><span style="font-size:11px;color:#ccc;cursor:pointer" onclick="deleteMoney('${key}',${idx})">✕</span></div>`;
    list.appendChild(row);
  });
  const mKey=selDate.getFullYear()+'-'+(selDate.getMonth()+1);
  let mOut=0,mIn=0;
  Object.keys(moneyData).forEach(k=>{if(k.startsWith(mKey+'-')||k===mKey)moneyData[k].forEach(i=>{if(i.type==='out')mOut+=i.amount;else mIn+=i.amount;});});
  document.getElementById('money-summary').innerHTML=`<div class="money-row"><span class="money-cat">월 수입</span><span class="money-amt in">+${mIn.toLocaleString()}</span></div><div class="money-row"><span class="money-cat">월 지출</span><span class="money-amt out">-${mOut.toLocaleString()}</span></div>`;
  document.getElementById('sum-m').textContent=total>=0?'+'+total.toLocaleString():total.toLocaleString();
  renderBudget();
}
window.openMoneyModal=function(){
  document.getElementById('mn-name').value='';document.getElementById('mn-amount').value='';
  document.getElementById('moneyModal').style.display='flex';
};
window.confirmMoney=async function(){
  const name=document.getElementById('mn-name').value.trim();if(!name)return;
  const type=document.getElementById('mn-type').value;
  const amount=parseInt(document.getElementById('mn-amount').value);if(!amount)return;
  const key=fmt(selDate);if(!moneyData[key])moneyData[key]=[];
  moneyData[key].push({name,type,amount});
  await saveData('money',key,{items:moneyData[key]});closeModal('moneyModal');
  renderMoney();if(leftMode==='money-cal')renderMoneyCal();
};
window.deleteMoney=async function(key,idx){
  if(!confirm('삭제할까요?'))return;
  moneyData[key].splice(idx,1);await saveData('money',key,{items:moneyData[key]});
  renderMoney();if(leftMode==='money-cal')renderMoneyCal();
};

// ── 식단 ──
function renderMeal(){
  const key=fmt(selDate);const data=mealData[key]||{};
  const slots=[['breakfast','아침'],['lunch','점심'],['dinner','저녁'],['snack','간식']];
  document.getElementById('meal-list').innerHTML=slots.map(([k,label])=>`
    <div class="meal-slot">
      <div class="meal-label">${label}</div>
      <div class="meal-text" contenteditable="true" data-ph="입력하세요" data-key="${k}"
        oninput="mealInput(this,'${key}','${k}')"
        onblur="mealBlur(this,'${key}','${k}')"
        style="outline:none">${data[k]||''}</div>
    </div>`).join('');
}
window.mealInput=function(el,dateKey,mealKey){
  if(!mealData[dateKey])mealData[dateKey]={};mealData[dateKey][mealKey]=el.innerText;
  clearTimeout(mealSaveTimers[mealKey]);
  mealSaveTimers[mealKey]=setTimeout(async()=>{await saveData('meal',dateKey,mealData[dateKey]);},600);
};
window.mealBlur=async function(el,dateKey,mealKey){
  clearTimeout(mealSaveTimers[mealKey]);
  if(!mealData[dateKey])mealData[dateKey]={};mealData[dateKey][mealKey]=el.innerText;
  await saveData('meal',dateKey,mealData[dateKey]);
};

// ── 메모 ──
function catLabel(c){return{'정체성':'🌟 정체성','할일':'✅ 할일','아이디어':'💡 아이디어','기타':'📌 기타'}[c]||'📌 기타';}
function renderMemos(){
  const list=document.getElementById('memo-list');list.innerHTML='';
  const filtered=currentMemoFilter==='전체'?memos:memos.filter(m=>m.category===currentMemoFilter);
  if(!filtered.length){list.innerHTML='<div style="font-size:13px;color:#ccc;text-align:center;padding:20px 0">메모가 없어요</div>';return;}
  filtered.forEach(memo=>{
    const card=document.createElement('div');card.className='memo-card';
    const dateStr=memo.createdAt?new Date(memo.createdAt).toLocaleDateString('ko-KR',{month:'long',day:'numeric'}):'';
    card.innerHTML=`<div class="memo-card-top"><span class="memo-card-title">${memo.title||'제목 없음'}</span><span class="memo-cat-badge ${memo.category||'기타'}">${catLabel(memo.category)}</span><button class="memo-delete" onclick="event.stopPropagation();deleteMemo('${memo.id}')">✕</button></div><div class="memo-card-body">${memo.body||''}</div><div class="memo-card-date">${dateStr}</div>`;
    card.addEventListener('click',()=>openMemoInLeft(memo.id));
    list.appendChild(card);
  });
}
function openMemoInLeft(id){
  viewingMemoId=id;const memo=memos.find(m=>m.id===id);if(!memo)return;
  setLeftMode('memo');
  const mv=document.getElementById('memoView');
  mv.innerHTML=`
    <div class="memo-detail-box">
      <span class="memo-detail-cat ${memo.category||'기타'}">${catLabel(memo.category)}</span>
      <input class="memo-detail-title-text" id="mvTitle" value="${(memo.title||'').replace(/"/g,'&quot;')}" placeholder="제목"/>
      <hr style="border:none;border-top:0.5px solid #eee"/>
      <textarea class="memo-detail-body-text" id="mvBody" placeholder="내용을 입력하세요...">${memo.body||''}</textarea>
      <div class="memo-detail-actions">
        <button class="mdabtn del" onclick="deleteMemoFromView('${id}')">삭제</button>
        <button class="mdabtn save" onclick="saveMemoFromView('${id}')">저장</button>
      </div>
    </div>`;
}
window.handleLeftBack=function(){viewingMemoId=null;setLeftMode('cal');};
window.saveMemoFromView=async function(id){
  const title=document.getElementById('mvTitle').value.trim();
  const body=document.getElementById('mvBody').value.trim();
  const m=memos.find(x=>x.id===id);if(!m)return;
  m.title=title;m.body=body;
  await saveData('memos',id,{title,category:m.category,body,createdAt:m.createdAt||Date.now()});renderMemos();
};
window.deleteMemoFromView=async function(id){
  if(!confirm('삭제할까요?'))return;
  memos=memos.filter(m=>m.id!==id);await deleteData('memos',id);renderMemos();setLeftMode('cal');
};
window.filterMemo=function(cat,el){
  currentMemoFilter=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');renderMemos();
};
window.openMemoModal=function(id){
  editingMemoId=id||null;const memo=id?memos.find(m=>m.id===id):null;
  document.getElementById('memoModalTitle').textContent=id?'메모 수정':'메모 추가';
  document.getElementById('memo-cat').value=memo?.category||'정체성';
  document.getElementById('memo-title').value=memo?.title||'';
  document.getElementById('memo-body').value=memo?.body||'';
  document.getElementById('memoModal').style.display='flex';
};
window.confirmMemo=async function(){
  const title=document.getElementById('memo-title').value.trim();if(!title)return alert('제목을 입력해주세요');
  const category=document.getElementById('memo-cat').value;const body=document.getElementById('memo-body').value.trim();
  if(editingMemoId){
    const m=memos.find(x=>x.id===editingMemoId);if(!m)return;
    m.title=title;m.category=category;m.body=body;
    await saveData('memos',editingMemoId,{title,category,body,createdAt:m.createdAt||Date.now()});
  } else {
    const id='m_'+Date.now();memos.unshift({id,title,category,body,createdAt:Date.now()});
    await saveData('memos',id,{title,category,body,createdAt:Date.now()});
  }
  closeModal('memoModal');renderMemos();
};
window.deleteMemo=async function(id){
  if(!confirm('삭제할까요?'))return;
  memos=memos.filter(m=>m.id!==id);await deleteData('memos',id);renderMemos();
  if(viewingMemoId===id)setLeftMode('cal');
};

// ── 디데이 ──
function calcDday(dateStr){
  const target=new Date(dateStr);target.setHours(0,0,0,0);
  const now=new Date();now.setHours(0,0,0,0);
  return Math.round((target-now)/(1000*60*60*24));
}
function renderDdays(){
  const list=document.getElementById('ddayList');list.innerHTML='';
  ddayList.forEach(dd=>{
    const diff=calcDday(dd.date);
    let numText,numClass,subText;
    if(diff>0){numText='D-'+diff;numClass='future';subText=dd.date+' 까지';}
    else if(diff===0){numText='D-Day';numClass='today';subText='오늘!';}
    else{numText='D+'+Math.abs(diff);numClass='past';subText=dd.date+' 지남';}
    const card=document.createElement('div');card.className='dday-card';
    card.innerHTML=`<button class="dday-del" onclick="deleteDday('${dd.id}')">✕</button><div class="dday-title">${dd.name}</div><div class="dday-num ${numClass}">${numText}</div><div class="dday-sub">${subText}</div>`;
    list.appendChild(card);
  });
  document.getElementById('ddayAddBtn').style.display=ddayList.length>=5?'none':'flex';
}
window.openDdayModal=function(){
  document.getElementById('dd-name').value='';document.getElementById('dd-date').value='';
  document.getElementById('ddayModal').style.display='flex';
};
window.confirmDday=async function(){
  if(ddayList.length>=5)return alert('최대 5개까지 추가할 수 있어요');
  const name=document.getElementById('dd-name').value.trim();if(!name)return;
  const date=document.getElementById('dd-date').value;if(!date)return;
  const id='d_'+Date.now();
  ddayList.push({id,name,date});ddayList.sort((a,b)=>new Date(a.date)-new Date(b.date));
  await saveData('ddays',id,{name,date});closeModal('ddayModal');renderDdays();
};
window.deleteDday=async function(id){
  if(!confirm('삭제할까요?'))return;
  ddayList=ddayList.filter(d=>d.id!==id);await deleteData('ddays',id);renderDdays();
};

window.closeModal=function(id){document.getElementById(id).style.display='none';};
document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.style.display='none';});});
</script>
