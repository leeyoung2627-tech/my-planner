<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>두목의 플래너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f4ff;display:flex;justify-content:center;padding:20px;min-height:100vh}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.login-box{background:#fff;border-radius:16px;padding:40px;width:320px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 4px 24px #0001;border:0.5px solid #eee}
.login-title{font-size:20px;font-weight:700;color:#222}
.login-sub{font-size:13px;color:#aaa;text-align:center}
.google-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;border-radius:8px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#222;font-family:inherit;width:100%;justify-content:center}
.google-btn:hover{background:#f5f5f5}
.google-btn img{width:20px;height:20px}
.app{display:grid;grid-template-columns:1fr 290px;min-height:640px;border:0.5px solid #ddd;border-radius:16px;overflow:hidden;background:#fff;width:100%;max-width:1000px;box-shadow:0 4px 24px #0001}
.left{display:flex;flex-direction:column;border-right:0.5px solid #eee}
.top-nav{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;border-bottom:0.5px solid #eee;flex-shrink:0}
.nav-btn{background:none;border:none;cursor:pointer;color:#666;padding:2px 8px;border-radius:4px;font-size:18px;line-height:1}
.nav-btn:hover{background:#f0f0f0}
.period-label{font-size:15px;font-weight:600;color:#222;flex:1}
.view-toggle{display:flex;gap:4px}
.vbtn{padding:4px 10px;border-radius:8px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:transparent;color:#888}
.vbtn.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.user-area{display:flex;align-items:center;gap:8px}
.user-name{font-size:12px;color:#888}
.logout-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid #eee;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:inherit}
.logout-btn:hover{background:#f5f5f5}
.cal-wrap{padding:.75rem 1rem;flex:1;overflow-y:auto}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dow{text-align:center;font-size:11px;color:#aaa;padding:2px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{min-height:60px;display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;font-size:12px;gap:2px}
.day-cell:hover{background:#f5f4ff}
.day-cell.other{color:#ccc}
.day-cell.today .dn{background:#534AB7;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.day-cell.selected{border-color:#AFA9EC;background:#EEEDFE}
.dot-row{display:flex;gap:2px;justify-content:center}
.dot{width:4px;height:4px;border-radius:50%;background:#534AB7}
.week-wrap{padding:.75rem 1rem;flex:1;overflow-y:auto}
.week-head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.wh-cell{text-align:center}
.wh-dow{font-size:11px;color:#aaa}
.wh-num{font-size:14px;font-weight:500;color:#222;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.wh-num.today{background:#534AB7;color:#fff}
.wh-num.selected{background:#EEEDFE;color:#3C3489}
.week-body{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;align-items:start}
.day-col{min-height:200px;border:0.5px solid #eee;border-radius:8px;padding:5px;display:flex;flex-direction:column;gap:3px;cursor:pointer}
.day-col:hover{background:#f9f8ff}
.day-col.selected{border-color:#AFA9EC;background:#EEEDFE44}
.week-event-item{background:#EEEDFE;border-radius:4px;padding:3px 5px;font-size:11px;color:#3C3489;line-height:1.3;word-break:break-all;cursor:pointer}
.week-event-item:hover{background:#dddaf5}
.week-add-btn{font-size:10px;color:#bbb;cursor:pointer;padding:2px;text-align:center;border-radius:4px;margin-top:auto}
.week-add-btn:hover{background:#eee;color:#888}
.right{display:flex;flex-direction:column;background:#fafafa}
.right-date{padding:.6rem 1rem;font-size:13px;font-weight:600;color:#222;border-bottom:0.5px solid #eee;flex-shrink:0}
.tabs{display:flex;border-bottom:0.5px solid #eee;flex-shrink:0}
.tab{flex:1;padding:7px 2px;text-align:center;font-size:11px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#534AB7;border-bottom-color:#534AB7;background:#fff}
.tab-content{flex:1;padding:.75rem 1rem;overflow-y:auto;display:none;flex-direction:column;gap:6px}
.tab-content.active{display:flex}
.section-title{font-size:11px;color:#aaa;margin-top:6px}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.item-row:last-of-type{border-bottom:none}
.check{width:16px;height:16px;border-radius:4px;border:0.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.check.done{background:#534AB7;border-color:#534AB7;color:#fff}
.item-text{font-size:13px;color:#222;flex:1}
.item-text.done{text-decoration:line-through;color:#bbb}
.item-time{font-size:11px;color:#aaa}
.add-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#aaa;cursor:pointer;padding:3px 0;background:none;border:none;margin-top:2px;font-family:inherit}
.add-btn:hover{color:#666}
.habit-card{background:#fff;border:0.5px solid #eee;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.habit-top{display:flex;align-items:center;justify-content:space-between}
.habit-name{font-size:13px;color:#222}
.habit-badge{font-size:11px;padding:2px 7px;border-radius:999px}
.habit-badge.done{background:#E1F5EE;color:#0F6E56}
.habit-badge.fail{background:#f5f5f5;color:#aaa}
.habit-badge.prog{background:#EEEDFE;color:#3C3489}
.habit-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hdot{width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ccc;transition:all .15s}
.hdot.filled{background:#1D9E75;border-color:#1D9E75;color:#fff}
.hdot.target{border-color:#AFA9EC;border-style:dashed}
.habit-goal{font-size:11px;color:#aaa}
.habit-actions{display:flex;gap:6px;justify-content:flex-end}
.habit-mini-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid #eee;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:inherit}
.habit-mini-btn:hover{background:#f5f5f5}
.money-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.money-row:last-of-type{border-bottom:none}
.money-cat{font-size:12px;color:#666}
.money-amt{font-size:13px;font-weight:500}
.money-amt.out{color:#D85A30}
.money-amt.in{color:#1D9E75}
.meal-slot{padding:6px 8px;border-radius:8px;border:0.5px solid #eee;background:#fff}
.meal-label{font-size:11px;color:#aaa;margin-bottom:2px}
.meal-text{font-size:13px;color:#222}
.summary-bar{padding:.6rem 1rem;border-top:0.5px solid #eee;display:flex;gap:6px;flex-shrink:0}
.sum-chip{flex:1;text-align:center;padding:4px 2px;border-radius:8px;font-size:11px}
.sum-chip.s{background:#EEEDFE;color:#3C3489}
.sum-chip.h{background:#E1F5EE;color:#0F6E56}
.sum-chip.m{background:#FAECE7;color:#993C1D}
.saving-indicator{position:fixed;bottom:20px;right:20px;background:#534AB7;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;display:none;z-index:999}
.modal-bg{position:fixed;inset:0;background:#00000040;display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:20px;width:280px;display:flex;flex-direction:column;gap:10px;border:0.5px solid #eee;box-shadow:0 8px 32px #0002}
.modal h3{font-size:14px;font-weight:600;color:#222}
.modal input,.modal select{width:100%;padding:6px 10px;border-radius:6px;border:0.5px solid #ddd;background:#fafafa;color:#222;font-size:13px;outline:none;font-family:inherit}
.modal-label{font-size:12px;color:#666}
.modal-row{display:flex;gap:8px}
.modal-row input,.modal-row select{flex:1}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mbtn{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-family:inherit}
.mbtn.cancel{background:#f0f0f0;color:#666}
.mbtn.ok{background:#534AB7;color:#fff}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:40px">📅</div>
    <div class="login-title">두목의 플래너</div>
    <div class="login-sub">구글 계정으로 로그인하면<br>어디서든 기록이 동기화돼요</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      Google로 로그인
    </button>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app" id="mainApp" style="display:none">
  <div class="left">
    <div class="top-nav">
      <button class="nav-btn" onclick="movePeriod(-1)">‹</button>
      <span class="period-label" id="periodLabel"></span>
      <button class="nav-btn" onclick="movePeriod(1)">›</button>
      <div class="view-toggle">
        <button class="vbtn active" id="btnMonth" onclick="switchView('month')">월</button>
        <button class="vbtn" id="btnWeek" onclick="switchView('week')">주</button>
      </div>
      <div class="user-area">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logoutUser()">로그아웃</button>
      </div>
    </div>
    <div id="monthView" class="cal-wrap"></div>
    <div id="weekView" class="week-wrap" style="display:none"></div>
  </div>
  <div class="right">
    <div class="right-date" id="rightDate"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('schedule',this)">📅 일정</div>
      <div class="tab" onclick="switchTab('habit',this)">✅ 습관</div>
      <div class="tab" onclick="switchTab('money',this)">💰 가계부</div>
      <div class="tab" onclick="switchTab('meal',this)">🥗 식단</div>
    </div>
    <div id="tab-schedule" class="tab-content active">
      <p class="section-title">선택한 날 일정</p>
      <div id="schedule-list"></div>
      <button class="add-btn" onclick="openScheduleModal()">＋ 일정 추가</button>
    </div>
    <div id="tab-habit" class="tab-content">
      <p class="section-title">이번 주 습관</p>
      <div id="habit-list"></div>
      <button class="add-btn" onclick="openHabitModal()">＋ 습관 추가</button>
    </div>
    <div id="tab-money" class="tab-content">
      <p class="section-title">선택한 날 가계부</p>
      <div id="money-list"></div>
      <button class="add-btn" onclick="openMoneyModal()">＋ 내역 추가</button>
      <p class="section-title" style="margin-top:8px">이번 달 합계</p>
      <div id="money-summary"></div>
    </div>
    <div id="tab-meal" class="tab-content">
      <p class="section-title">선택한 날 식단</p>
      <div id="meal-list"></div>
    </div>
    <div class="summary-bar">
      <div class="sum-chip s" id="sum-s">일정 -</div>
      <div class="sum-chip h" id="sum-h">습관 -</div>
      <div class="sum-chip m" id="sum-m">가계부 -</div>
    </div>
  </div>
</div>

<div class="saving-indicator" id="savingIndicator">저장 중...</div>

<!-- 일정 모달 -->
<div class="modal-bg" id="scheduleModal" style="display:none">
  <div class="modal">
    <h3>일정 추가</h3>
    <div class="modal-label">일정 이름</div>
    <input id="sch-name" placeholder="예: 병원 예약"/>
    <div class="modal-label">시간 (선택)</div>
    <input id="sch-time" type="time"/>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('scheduleModal')">취소</button>
      <button class="mbtn ok" onclick="confirmSchedule()">추가</button>
    </div>
  </div>
</div>

<!-- 습관 추가 모달 -->
<div class="modal-bg" id="habitModal" style="display:none">
  <div class="modal">
    <h3>습관 추가</h3>
    <div class="modal-label">습관 이름</div>
    <input id="hb-name" placeholder="예: 크로키 연습"/>
    <div class="modal-label">이모지 (선택)</div>
    <input id="hb-emoji" placeholder="예: ✏️"/>
    <div class="modal-label">목표 주기 / 횟수</div>
    <div class="modal-row">
      <select id="hb-period"><option value="week">주 단위</option><option value="month">월 단위</option></select>
      <input id="hb-target" type="number" min="1" max="31" value="3"/>
    </div>
    <div class="modal-label" style="color:#aaa;font-size:11px" id="hb-preview">주 3회 목표</div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('habitModal')">취소</button>
      <button class="mbtn ok" onclick="confirmHabit()">추가</button>
    </div>
  </div>
</div>

<!-- 습관 수정 모달 -->
<div class="modal-bg" id="habitEditModal" style="display:none">
  <div class="modal">
    <h3>목표 수정</h3>
    <div class="modal-label">목표 주기 / 횟수</div>
    <div class="modal-row">
      <select id="he-period"><option value="week">주 단위</option><option value="month">월 단위</option></select>
      <input id="he-target" type="number" min="1" max="31" value="3"/>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('habitEditModal')">취소</button>
      <button class="mbtn ok" onclick="confirmHabitEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 가계부 모달 -->
<div class="modal-bg" id="moneyModal" style="display:none">
  <div class="modal">
    <h3>가계부 추가</h3>
    <div class="modal-label">내용</div>
    <input id="mn-name" placeholder="예: 점심식사"/>
    <div class="modal-label">금액</div>
    <div class="modal-row">
      <select id="mn-type"><option value="out">지출 (−)</option><option value="in">수입 (+)</option></select>
      <input id="mn-amount" type="number" placeholder="금액" min="0"/>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('moneyModal')">취소</button>
      <button class="mbtn ok" onclick="confirmMoney()">추가</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkSmyAwRUlpgZBUz0kXqCVoS29dYht7No",
  authDomain: "my-planner-3728c.firebaseapp.com",
  projectId: "my-planner-3728c",
  storageBucket: "my-planner-3728c.firebasestorage.app",
  messagingSenderId: "179812397978",
  appId: "1:179812397978:web:3525714542291e818e0023"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
const today = new Date();
let cur = new Date(today.getFullYear(), today.getMonth(), 1);
let selDate = new Date(today);
let curView = 'month';
const DAYS = ['일','월','화','수','목','금','토'];
let habits = [];
let editingHabitId = null;
let weekEvents = {};
let moneyData = {};
let mealData = {};

function fmt(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function getWeekKey(d){return fmt(d)}
function showSaving(){
  const el=document.getElementById('savingIndicator');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1500);
}

// ── Auth ──
window.loginWithGoogle = async function(){
  try{ await signInWithPopup(auth, provider); }
  catch(e){ alert('로그인 실패: '+e.message); }
};
window.logoutUser = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('mainApp').style.display='grid';
    document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || '';
    await loadAllData();
    renderMonth(); updateRightDate(); renderHabits(); renderSchedule(); renderMoney(); renderMeal();
  } else {
    currentUser = null;
    document.getElementById('loginWrap').style.display='flex';
    document.getElementById('mainApp').style.display='none';
  }
});

// ── Firestore 저장/불러오기 ──
async function saveData(type, key, value){
  if(!currentUser) return;
  showSaving();
  await setDoc(doc(db, 'users', currentUser.uid, type, key), value);
}
async function deleteData(type, key){
  if(!currentUser) return;
  await deleteDoc(doc(db, 'users', currentUser.uid, type, key));
}
async function loadAllData(){
  if(!currentUser) return;
  // 이벤트
  const evSnap = await getDocs(collection(db,'users',currentUser.uid,'events'));
  weekEvents = {};
  evSnap.forEach(d=>{ weekEvents[d.id]=d.data().items||[]; });
  // 습관
  const hbSnap = await getDocs(collection(db,'users',currentUser.uid,'habits'));
  habits = [];
  hbSnap.forEach(d=>{ habits.push({id:d.id,...d.data()}); });
  // 가계부
  const mnSnap = await getDocs(collection(db,'users',currentUser.uid,'money'));
  moneyData = {};
  mnSnap.forEach(d=>{ moneyData[d.id]=d.data().items||[]; });
  // 식단
  const mlSnap = await getDocs(collection(db,'users',currentUser.uid,'meal'));
  mealData = {};
  mlSnap.forEach(d=>{ mealData[d.id]=d.data(); });
}

// ── 캘린더 ──
function movePeriod(dir){
  if(curView==='month'){cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1);renderMonth();}
  else{selDate=new Date(selDate);selDate.setDate(selDate.getDate()+dir*7);renderWeek();updateRightDate();}
}
function renderMonth(){
  document.getElementById('periodLabel').textContent=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월';
  const start=new Date(cur.getFullYear(),cur.getMonth(),1).getDay();
  const total=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const prevTotal=new Date(cur.getFullYear(),cur.getMonth(),0).getDate();
  let html='<div class="dow-row">'+DAYS.map(d=>`<div class="dow">${d}</div>`).join('')+'</div><div class="month-grid">';
  for(let i=0;i<start;i++)html+=`<div class="day-cell other"><span class="dn">${prevTotal-start+1+i}</span></div>`;
  for(let d=1;d<=total;d++){
    const dt=new Date(cur.getFullYear(),cur.getMonth(),d);
    const key=getWeekKey(dt);
    const isToday=fmt(dt)===fmt(today);
    const isSel=fmt(dt)===fmt(selDate);
    const hasEv=(weekEvents[key]&&weekEvents[key].length>0)||(moneyData[key]&&moneyData[key].length>0);
    html+=`<div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay(${d})"><span class="dn">${d}</span><div class="dot-row">${hasEv?'<div class="dot"></div>':''}</div></div>`;
  }
  const rem=(7-(start+total)%7)%7;
  for(let i=1;i<=rem&&rem<7;i++)html+=`<div class="day-cell other"><span class="dn">${i}</span></div>`;
  html+='</div>';
  document.getElementById('monthView').innerHTML=html;
}
function getWeekStart(d){const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s;}
function renderWeek(){
  const ws=getWeekStart(selDate);
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const m1=ws.getMonth()+1,m2=we.getMonth()+1;
  let label=ws.getFullYear()+'년 '+m1+'월 '+ws.getDate()+'일';
  if(m1!==m2)label+=' ~ '+m2+'월 '+we.getDate()+'일';
  else label+=' ~ '+we.getDate()+'일';
  document.getElementById('periodLabel').textContent=label;
  let headHtml='<div class="week-head-row">';
  let bodyHtml='<div class="week-body">';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const isT=fmt(d)===fmt(today);
    const isS=fmt(d)===fmt(selDate);
    headHtml+=`<div class="wh-cell"><div class="wh-dow">${DAYS[i]}</div><div class="wh-num${isT?' today':isS?' selected':''}">${d.getDate()}</div></div>`;
    const key=getWeekKey(d);
    const evs=weekEvents[key]||[];
    const dStr=`${d.getFullYear()},${d.getMonth()},${d.getDate()}`;
    bodyHtml+=`<div class="day-col${isS?' selected':''}" onclick="selectDayFromWeek(${dStr})">`;
    evs.forEach((ev,idx)=>{bodyHtml+=`<div class="week-event-item" onclick="event.stopPropagation();editWeekEvent('${key}',${idx})">${ev}</div>`;});
    bodyHtml+=`<div class="week-add-btn" onclick="event.stopPropagation();addWeekEvent('${key}')">＋</div></div>`;
  }
  document.getElementById('weekView').innerHTML=headHtml+'</div>'+bodyHtml+'</div>';
}
window.selectDay = function(d){
  selDate=new Date(cur.getFullYear(),cur.getMonth(),d);
  renderMonth();updateRightDate();renderSchedule();renderMoney();renderMeal();
};
window.selectDayFromWeek = function(y,m,d){
  selDate=new Date(y,m,d);renderWeek();updateRightDate();renderSchedule();renderMoney();renderMeal();
};
function updateRightDate(){
  document.getElementById('rightDate').textContent=selDate.getFullYear()+'년 '+(selDate.getMonth()+1)+'월 '+selDate.getDate()+'일 '+DAYS[selDate.getDay()]+'요일';
}
window.addWeekEvent = async function(key){
  const name=prompt('일정 입력:');
  if(!name||!name.trim())return;
  if(!weekEvents[key])weekEvents[key]=[];
  weekEvents[key].push(name.trim());
  await saveData('events',key,{items:weekEvents[key]});
  renderWeek();renderMonth();renderSchedule();
};
window.editWeekEvent = async function(key,idx){
  const c=weekEvents[key][idx];
  const name=prompt('수정 (비우면 삭제):',c);
  if(name===null)return;
  if(name.trim()==='')weekEvents[key].splice(idx,1);
  else weekEvents[key][idx]=name.trim();
  await saveData('events',key,{items:weekEvents[key]});
  renderWeek();renderMonth();renderSchedule();
};
window.switchView = function(v){
  curView=v;
  document.getElementById('monthView').style.display=v==='month'?'':'none';
  document.getElementById('weekView').style.display=v==='week'?'':'none';
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  if(v==='week')renderWeek();else renderMonth();
};
window.switchTab = function(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
};
window.movePeriod = movePeriod;

// ── 일정 패널 ──
function renderSchedule(){
  const key=fmt(selDate);
  const evs=weekEvents[key]||[];
  const list=document.getElementById('schedule-list');
  list.innerHTML='';
  evs.forEach((ev,idx)=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<div class="check" onclick="toggleScheduleCheck(this)"></div><span class="item-text">${ev}</span><span style="font-size:11px;color:#aaa;cursor:pointer" onclick="deleteScheduleItem('${key}',${idx})">✕</span>`;
    list.appendChild(row);
  });
  document.getElementById('sum-s').textContent='일정 '+evs.length+'개';
}
window.toggleScheduleCheck = function(el){
  el.classList.toggle('done');el.textContent=el.classList.contains('done')?'✓':'';
  el.nextElementSibling.classList.toggle('done');
};
window.deleteScheduleItem = async function(key,idx){
  if(!confirm('삭제할까요?'))return;
  weekEvents[key].splice(idx,1);
  await saveData('events',key,{items:weekEvents[key]});
  renderSchedule();renderMonth();if(curView==='week')renderWeek();
};
window.openScheduleModal = function(){document.getElementById('scheduleModal').style.display='flex';};
window.confirmSchedule = async function(){
  const name=document.getElementById('sch-name').value.trim();if(!name)return;
  const time=document.getElementById('sch-time').value;
  const key=fmt(selDate);
  if(!weekEvents[key])weekEvents[key]=[];
  weekEvents[key].push(time?`[${time}] ${name}`:name);
  await saveData('events',key,{items:weekEvents[key]});
  closeModal('scheduleModal');renderSchedule();renderMonth();if(curView==='week')renderWeek();
};

// ── 습관 ──
function renderHabits(){
  const list=document.getElementById('habit-list');list.innerHTML='';
  let tt=0,td2=0;
  habits.forEach(h=>{
    tt+=h.target;td2+=Math.min(h.done||0,h.target);
    const pct=Math.round(Math.min((h.done||0)/h.target,1)*100);
    const isDone=(h.done||0)>=h.target;
    const badgeClass=isDone?'done':(h.done||0)>0?'prog':'fail';
    const badgeText=isDone?'✓ 달성':(h.done||0)+'/'+h.target;
    const pl=h.period==='week'?'주':'월';
    let dotsHtml='<div class="habit-dots">';
    for(let i=0;i<Math.max(h.target,h.done||0);i++){
      const filled=i<(h.done||0),isTarget=i<h.target;
      dotsHtml+=`<div class="hdot${filled?' filled':''}${!filled&&isTarget?' target':''}" onclick="toggleHabitDot('${h.id}',${i})">${filled?'✓':''}</div>`;
    }
    dotsHtml+='</div>';
    const card=document.createElement('div');card.className='habit-card';
    card.innerHTML=`<div class="habit-top"><span class="habit-name">${h.emoji||'⭐'} ${h.name}</span><span class="habit-badge ${badgeClass}">${badgeText}</span></div>${dotsHtml}<div style="display:flex;justify-content:space-between;align-items:center"><span class="habit-goal">${pl} ${h.target}회 목표 · ${pct}%</span><div class="habit-actions"><button class="habit-mini-btn" onclick="openHabitEdit('${h.id}')">목표 수정</button><button class="habit-mini-btn" onclick="deleteHabit('${h.id}')">삭제</button></div></div>`;
    list.appendChild(card);
  });
  const pct=tt>0?Math.round(td2/tt*100):0;
  document.getElementById('sum-h').textContent='습관 '+pct+'%';
}
window.toggleHabitDot = async function(id,idx){
  const h=habits.find(x=>x.id===id);if(!h)return;
  if(idx<(h.done||0))h.done=idx;else h.done=idx+1;
  await saveData('habits',id,{name:h.name,emoji:h.emoji,period:h.period,target:h.target,done:h.done});
  renderHabits();
};
window.openHabitModal = function(){
  document.getElementById('habitModal').style.display='flex';
  document.getElementById('hb-name').value='';
  document.getElementById('hb-emoji').value='';
  document.getElementById('hb-target').value=3;
  updateHabitPreview();
};
function updateHabitPreview(){
  const p=document.getElementById('hb-period').value==='week'?'주':'월';
  const t=document.getElementById('hb-target').value;
  document.getElementById('hb-preview').textContent=p+' '+t+'회 목표';
}
document.addEventListener('input',e=>{if(e.target.id==='hb-target'||e.target.id==='hb-period')updateHabitPreview();});
window.confirmHabit = async function(){
  const name=document.getElementById('hb-name').value.trim();
  if(!name)return alert('이름을 입력해주세요');
  const emoji=document.getElementById('hb-emoji').value.trim()||'⭐';
  const period=document.getElementById('hb-period').value;
  const target=parseInt(document.getElementById('hb-target').value)||3;
  const id='h_'+Date.now();
  const newH={id,name,emoji,period,target,done:0};
  habits.push(newH);
  await saveData('habits',id,{name,emoji,period,target,done:0});
  renderHabits();closeModal('habitModal');
};
window.openHabitEdit = function(id){
  editingHabitId=id;
  const h=habits.find(x=>x.id===id);if(!h)return;
  document.getElementById('he-period').value=h.period;
  document.getElementById('he-target').value=h.target;
  document.getElementById('habitEditModal').style.display='flex';
};
window.confirmHabitEdit = async function(){
  const h=habits.find(x=>x.id===editingHabitId);if(!h)return;
  h.period=document.getElementById('he-period').value;
  h.target=parseInt(document.getElementById('he-target').value)||1;
  await saveData('habits',h.id,{name:h.name,emoji:h.emoji,period:h.period,target:h.target,done:h.done||0});
  renderHabits();closeModal('habitEditModal');
};
window.deleteHabit = async function(id){
  if(!confirm('삭제할까요?'))return;
  habits=habits.filter(x=>x.id!==id);
  await deleteData('habits',id);
  renderHabits();
};

// ── 가계부 ──
function renderMoney(){
  const key=fmt(selDate);
  const items=moneyData[key]||[];
  const list=document.getElementById('money-list');
  list.innerHTML='';
  let total=0;
  items.forEach((item,idx)=>{
    const row=document.createElement('div');row.className='money-row';
    const amt=item.type==='out'?-item.amount:item.amount;
    total+=amt;
    row.innerHTML=`<span class="money-cat">${item.name}</span><div style="display:flex;align-items:center;gap:8px"><span class="money-amt ${item.type}">${item.type==='out'?'-':'+'}${item.amount.toLocaleString()}</span><span style="font-size:11px;color:#ccc;cursor:pointer" onclick="deleteMoney('${key}',${idx})">✕</span></div>`;
    list.appendChild(row);
  });
  // 월 합계
  const monthKey=selDate.getFullYear()+'-'+(selDate.getMonth()+1);
  let monthOut=0,monthIn=0;
  Object.keys(moneyData).forEach(k=>{
    if(k.startsWith(monthKey)){
      moneyData[k].forEach(item=>{
        if(item.type==='out')monthOut+=item.amount;
        else monthIn+=item.amount;
      });
    }
  });
  document.getElementById('money-summary').innerHTML=`<div class="money-row"><span class="money-cat">총 지출</span><span class="money-amt out">-${monthOut.toLocaleString()}</span></div><div class="money-row"><span class="money-cat">총 수입</span><span class="money-amt in">+${monthIn.toLocaleString()}</span></div>`;
  document.getElementById('sum-m').textContent=total>=0?'+'+total.toLocaleString():total.toLocaleString();
}
window.openMoneyModal = function(){document.getElementById('moneyModal').style.display='flex';};
window.confirmMoney = async function(){
  const name=document.getElementById('mn-name').value.trim();if(!name)return;
  const type=document.getElementById('mn-type').value;
  const amount=parseInt(document.getElementById('mn-amount').value);if(!amount)return;
  const key=fmt(selDate);
  if(!moneyData[key])moneyData[key]=[];
  moneyData[key].push({name,type,amount});
  await saveData('money',key,{items:moneyData[key]});
  closeModal('moneyModal');renderMoney();renderMonth();
};
window.deleteMoney = async function(key,idx){
  if(!confirm('삭제할까요?'))return;
  moneyData[key].splice(idx,1);
  await saveData('money',key,{items:moneyData[key]});
  renderMoney();
};

// ── 식단 ──
function renderMeal(){
  const key=fmt(selDate);
  const data=mealData[key]||{breakfast:'',lunch:'',dinner:'',snack:''};
  document.getElementById('meal-list').innerHTML=`
    <div class="meal-slot"><div class="meal-label">아침</div><div class="meal-text" contenteditable="true" onblur="saveMeal('breakfast',this.innerText)" style="outline:none;min-height:20px">${data.breakfast||'<span style="color:#ccc">입력하세요</span>'}</div></div>
    <div class="meal-slot"><div class="meal-label">점심</div><div class="meal-text" contenteditable="true" onblur="saveMeal('lunch',this.innerText)" style="outline:none;min-height:20px">${data.lunch||'<span style="color:#ccc">입력하세요</span>'}</div></div>
    <div class="meal-slot"><div class="meal-label">저녁</div><div class="meal-text" contenteditable="true" onblur="saveMeal('dinner',this.innerText)" style="outline:none;min-height:20px">${data.dinner||'<span style="color:#ccc">입력하세요</span>'}</div></div>
    <div class="meal-slot"><div class="meal-label">간식</div><div class="meal-text" contenteditable="true" onblur="saveMeal('snack',this.innerText)" style="outline:none;min-height:20px">${data.snack||'<span style="color:#ccc">입력하세요</span>'}</div></div>`;
}
window.saveMeal = async function(type,text){
  const key=fmt(selDate);
  if(!mealData[key])mealData[key]={};
  mealData[key][type]=text;
  await saveData('meal',key,mealData[key]);
};

window.closeModal = function(id){document.getElementById(id).style.display='none';};
document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.style.display='none';});});

</script>
